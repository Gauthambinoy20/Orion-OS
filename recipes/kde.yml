---
# Orion OS — KDE Plasma recipe (M1, P#1.2)
#
# Aurora already ships KDE Plasma 6 on a Fedora Atomic base, so the bulk
# of the desktop is inherited. This recipe only:
#
#   1. Pins the small set of KDE packages we want to guarantee are
#      present on every Orion install (some Aurora variants strip them).
#   2. Removes a handful of KDE applets and applications we deliberately
#      do NOT want as part of the default Orion experience (per plan
#      §5.2: focused, AI-first desktop — fewer demos, more deliberate
#      defaults).
#
# Reserved for later milestones (added when they carry real content, so
# we never ship an empty no-op module): default-flatpaks selection and
# the AI-aware KDE integration hooks (KRunner plugin, Plasma activity
# hooks) land in M6. Branding (wallpapers, logo, look-and-feel) ships in
# the branding recipe (P#1.8 placeholder, real assets in M8).
#
# Included from recipe.yml via from-file, so the modules live under a
# single top-level `modules:` list.

modules:
  # ---- Packages we always want present ----
  - type: rpm-ostree
    install:
      # Core Plasma 6 desktop pieces. Listed even though Aurora installs
      # them, so a future Aurora variant cannot silently drop them on us.
      - plasma-desktop
      - plasma-workspace
      - plasma-systemmonitor
      - kwin
      - kde-cli-tools

      # Default Orion application set. Kept intentionally small; user-tier
      # bundles land in their own recipes.
      - dolphin                 # file manager
      - konsole                 # terminal
      # kate doubles as the default GUI text editor for AI prompts
      - kate
      - kcalc                   # calculator
      - gwenview                # image viewer
      - okular                  # PDF / document viewer
      - ark                     # archive manager
      # spectacle is used by the AI screen-context feature in M6
      - spectacle
      # partitionmanager is required at runtime by the Calamares installer
      # for custom partitioning
      - partitionmanager

    # No `remove:` list here on purpose. rpm-ostree errors out if asked to
    # remove a package that isn't installed, and the streamlined Aurora DX
    # base does not ship the KDE PIM suite (kmail/kontact/korganizer/
    # akregator) or the bundled games (kmahjongg/kpat/kmines) — so there is
    # nothing to remove. If a future Aurora base does start shipping one of
    # these, add it back here individually after confirming it is present.
