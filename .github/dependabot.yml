---
# Orion OS — Dependabot configuration
# https://docs.github.com/en/code-security/dependabot/dependabot-version-updates/configuration-options-for-the-dependabot.yml-file
#
# Goal: keep the supply chain fresh without noise. Group patch/minor
# updates per ecosystem so we get one PR a week per area, not 30.
# Major bumps stay separate so they always get an explicit review.

version: 2

updates:
  # ---- GitHub Actions used by our workflows ----
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "06:00"
      timezone: Etc/UTC
    open-pull-requests-limit: 5
    labels:
      - dependencies
      - ci
    commit-message:
      prefix: ci
      include: scope
    groups:
      actions-minor-and-patch:
        update-types:
          - minor
          - patch

  # NOTE: cargo and npm ecosystems are intentionally NOT declared yet.
  # Dependabot errors when it cannot find a manifest, and this repo has
  # no Cargo.toml (the Rust workspace lands in M4, P#4.1) and no
  # package.json (commitlint runs via npx, no local manifest). Re-add a
  # `cargo` block with the workspace in M4, and an `npm` block only if a
  # package.json is ever committed.
