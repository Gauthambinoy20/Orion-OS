---
# Orion OS — Dependabot configuration
# https://docs.github.com/en/code-security/dependabot/dependabot-version-updates/configuration-options-for-the-dependabot.yml-file
#
# Goal: keep the supply chain fresh without noise. Group patch/minor
# updates per ecosystem so we get one PR a week per area, not 30.
# Major bumps stay separate so they always get an explicit review.
#
# Only ecosystems with a manifest in the repo are declared. Dependabot
# errors when it cannot find one, so cargo (Rust workspace lands in M4,
# P#4.1) and npm (commitlint runs via npx, no package.json) are omitted
# for now. Re-add a cargo block with the workspace in M4, and an npm
# block only if a package.json is ever committed.

version: 2

updates:
  # ---- GitHub Actions used by our workflows ----
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "06:00"
      timezone: Etc/UTC
    open-pull-requests-limit: 5
    labels:
      - dependencies
      - ci
    commit-message:
      prefix: ci
      include: scope
    groups:
      actions-minor-and-patch:
        update-types:
          - minor
          - patch
