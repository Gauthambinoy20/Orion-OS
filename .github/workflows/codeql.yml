---
# Orion OS — CodeQL static analysis
#
# Completes the canonical security pipeline (gitleaks + Trivy + CodeQL +
# Dependabot). Orion is mostly shell and YAML, which CodeQL does not
# analyse, so we scan what it does support here:
#   - actions: the GitHub Actions workflows (the supply-chain surface
#     that actually runs with repo permissions).
#   - javascript-typescript: any JS/TS config (e.g. commitlint.config.js).
#
# As the Rust workspace lands in M4, add a `rust` entry to the matrix.

name: codeql

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: "23 4 * * 1"   # Mondays 04:23 UTC

permissions:
  contents: read

concurrency:
  group: codeql-${{ github.ref }}
  cancel-in-progress: true

jobs:
  analyze:
    name: analyze (${{ matrix.language }})
    runs-on: ubuntu-latest
    permissions:
      security-events: write   # upload CodeQL results to code scanning
      contents: read
    strategy:
      fail-fast: false
      matrix:
        language: [actions, javascript-typescript]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: ${{ matrix.language }}
          queries: security-and-quality

      - name: Analyze
        uses: github/codeql-action/analyze@v3
        with:
          category: "/language:${{ matrix.language }}"
